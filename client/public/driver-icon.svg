<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Truck body -->
  <rect x="60" y="230" width="230" height="130" rx="14" fill="white" opacity="0.92"/>
  <!-- Cab -->
  <rect x="270" y="264" width="130" height="96" rx="14" fill="white" opacity="0.92"/>
  <!-- Cab window -->
  <rect x="284" y="280" width="70" height="44" rx="8" fill="#7C3AED" opacity="0.7"/>
  <!-- Cargo chevrons -->
  <path d="M88 280 L118 310 L88 340" stroke="#7C3AED" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M128 280 L158 310 L128 340" stroke="#7C3AED" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <!-- Wheels -->
  <circle cx="140" cy="372" r="36" fill="white" opacity="0.9"/>
  <circle cx="140" cy="372" r="18" fill="#7C3AED" opacity="0.7"/>
  <circle cx="320" cy="372" r="36" fill="white" opacity="0.9"/>
  <circle cx="320" cy="372" r="18" fill="#7C3AED" opacity="0.7"/>
  <!-- Speed lines -->
  <path d="M60 170 L100 200 L60 230" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
  <path d="M90 150 L130 185 L90 220" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.25"/>
</svg>
